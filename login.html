<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Member Access | Gleam Cart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo"><span>G</span>leam <span>C</span>art</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="login.html" class="active">Login</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="auth-box">
            <h2>Create Account</h2>
            <p>Join the inner circle for exclusive offers.</p>
            <div class="gold-line"></div>
            
            <input type="text" id="reg-user" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-pass" placeholder="Create Password">
            
            <button class="btn-alt" onclick="register()">Create Account</button>
        </div>

        <div class="auth-box">
            <h2>Login</h2>
            <p>Welcome back to elegance.</p>
            <div class="gold-line"></div>
            
            <input type="email" id="log-email" placeholder="Email Address">
            <input type="password" id="log-pass" placeholder="Password">
            
            <button class="btn-alt" onclick="login()">Sign In</button>
            <p id="message" style="margin-top: 15px; font-weight: bold; color: var(--mocha);"></p>
        </div>
    </div>
    <script>
        // Function to Save Account (Register)
        function register() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if(email && pass) {
                // This saves the data in the browser's memory
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userPass', pass);
                alert("Account Created Successfully! Now you can Login.");
            } else {
                alert("Please fill all fields.");
            }
        }

        // Function to Check Account (Login)
        function login() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;
            
            // This pulls the saved data from the browser
            const savedEmail = localStorage.getItem('userEmail');
            const savedPass = localStorage.getItem('userPass');

            if(email === savedEmail && pass === savedPass) {
                document.getElementById('message').innerText = "Welcome back, " + email + "!";
                document.getElementById('message').style.color = "green";
                // Redirect to shop after 2 seconds
                setTimeout(() => { window.location.href = "shop.html"; }, 2000);
            } else {
                document.getElementById('message').innerText = "Invalid Email or Password.";
                document.getElementById('message').style.color = "red";
            }
        }
    </script>

</body>
</html>
