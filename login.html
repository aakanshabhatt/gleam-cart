<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gleam Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to access your premium collection</p>

        <!-- Success/Error message box -->
        <div id="message" style="display:none; padding:10px; border-radius:6px; margin-bottom:15px; text-align:center;"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="auth-btn">Login</button>
        </form>

        <p class="toggle-text">
            Don't have an account? <a href="signup.html">Sign Up here</a>
        </p>
    </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const msgBox = document.getElementById('message');

    try {
        const response = await fetch('gleam-cart-backend-production.up.railway.app/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
            // Save token and user info
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            // Show success
            msgBox.style.display = 'block';
            msgBox.style.backgroundColor = '#d4edda';
            msgBox.style.color = '#155724';
            msgBox.innerText = 'Welcome back, ' + data.user.name + '! Redirecting...';

            // Redirect to shop after 1.5 seconds
            setTimeout(function() {
                window.location.href = 'shop.html';
            }, 1500);

        } else {
            msgBox.style.display = 'block';
            msgBox.style.backgroundColor = '#f8d7da';
            msgBox.style.color = '#721c24';
            msgBox.innerText = data.message || 'Invalid email or password!';
        }

    } catch (err) {
        msgBox.style.display = 'block';
        msgBox.style.backgroundColor = '#f8d7da';
        msgBox.style.color = '#721c24';
        msgBox.innerText = 'Cannot connect to server. Make sure server is running!';
    }
});
</script>

</body>
</html>
