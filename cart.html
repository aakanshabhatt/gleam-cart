<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart | Gleam Cart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo"><span>G</span>leam <span>C</span>art</div>
       <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li>
        <a href="cart.html" class="nav-icon active">
            <i class="fas fa-shopping-bag"></i>
            <span>Cart</span>
            <span class="cart-badge" id="cartCount">0</span>
        </a>
    </li>
    <li>
        <a href="#" class="nav-icon" id="userNavBtn">
            <i class="fas fa-user-circle"></i>
            <span id="userNavName"></span>
        </a>
    </li>
</ul>

    </nav>

    <div class="container">
        <h2 class="section-header">Your Luxury Selection</h2>
        <div class="gold-line"></div>

        <!-- Message box -->
        <div id="message" style="display:none; padding:10px; border-radius:6px; margin-bottom:15px; text-align:center;"></div>

        <div id="cart-content"></div>

        <div class="cart-summary" id="cart-summary" style="display:none;">
            <h3>Total: <span id="total-price">₹0</span></h3>
            <button class="btn-alt" onclick="checkout()">Proceed to Checkout</button>
            <button class="btn-clear" onclick="clearCart()">Clear Cart</button>
        </div>
    </div>

    <script>
        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('gleamCart')) || [];
            const container = document.getElementById('cart-content');
            const summary = document.getElementById('cart-summary');
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Your cart is currently empty. Gleam awaits!</p>";
                summary.style.display = "none";
                return;
            }

            summary.style.display = "block";
            container.innerHTML = "";

            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>Premium Gold Edition</p>
                        </div>
                        <div class="cart-item-price">₹${item.price.toLocaleString('en-IN')}</div>
                        <button class="remove-btn" onclick="removeItem(${index})">✕</button>
                    </div>
                `;
            });

            document.getElementById('total-price').innerText = "₹" + total.toLocaleString('en-IN');
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('gleamCart'));
            cart.splice(index, 1);
            localStorage.setItem('gleamCart', JSON.stringify(cart));
            displayCart();
        }

        function clearCart() {
            localStorage.removeItem('gleamCart');
            displayCart();
        }

        async function checkout() {
            // Check if user is logged in
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user'));

            if (!token) {
                const msgBox = document.getElementById('message');
                msgBox.style.display = 'block';
                msgBox.style.backgroundColor = '#f8d7da';
                msgBox.style.color = '#721c24';
                msgBox.innerText = 'Please login first to place your order!';
                setTimeout(function() {
                    window.location.href = 'login.html';
                }, 2000);
                return;
            }

            const cart = JSON.parse(localStorage.getItem('gleamCart')) || [];
            if (cart.length === 0) return;

            // Prepare order items
            const items = cart.map(function(item) {
                return {
                    name: item.name,
                    price: item.price,
                    quantity: 1
                };
            });

            const totalAmount = cart.reduce(function(sum, item) {
                return sum + item.price;
            }, 0);

            try {
                const response = await fetch('https://gleam-cart-backend.onrender.com/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ items, totalAmount })
                });

                const data = await response.json();

                const msgBox = document.getElementById('message');
                msgBox.style.display = 'block';

                if (response.ok) {
                    msgBox.style.backgroundColor = '#d4edda';
                    msgBox.style.color = '#155724';
                    msgBox.innerText = 'Order placed successfully! Thank you for shopping at Gleam Cart! 🛍️';

                    // Clear cart after successful order
                    localStorage.removeItem('gleamCart');
                    setTimeout(function() {
                        displayCart();
                    }, 2000);

                } else {
                    msgBox.style.backgroundColor = '#f8d7da';
                    msgBox.style.color = '#721c24';
                    msgBox.innerText = data.message || 'Could not place order. Try again!';
                }

            } catch (err) {
                const msgBox = document.getElementById('message');
                msgBox.style.display = 'block';
                msgBox.style.backgroundColor = '#f8d7da';
                msgBox.style.color = '#721c24';
                msgBox.innerText = 'Cannot connect to server. Make sure server is running!';
            }
        }

        displayCart();
    </script>
<script>
// Cart count update
function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('gleamCart')) || [];
    const badge = document.getElementById('cartCount');
    if (badge) {
        badge.innerText = cart.length;
        badge.style.display = cart.length > 0 ? 'flex' : 'none';
    }
}

// User nav update
function updateUserNav() {
    const user = JSON.parse(localStorage.getItem('user'));
    const userBtn = document.getElementById('userNavBtn');
    const userName = document.getElementById('userNavName');

    if (user && userBtn) {
        userName.innerText = user.name.split(' ')[0]; // First name only
        userBtn.onclick = function(e) {
            e.preventDefault();
            toggleDropdown();
        }

        // Add dropdown if not exists
        if (!document.getElementById('userDropdown')) {
            const dropdown = document.createElement('div');
            dropdown.className = 'user-dropdown';
            dropdown.id = 'userDropdown';
            dropdown.innerHTML = `
                <h4>👋 ${user.name}</h4>
                <a href="orders.html"><i class="fas fa-box"></i> My Orders</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            `;
            document.body.appendChild(dropdown);
        }
    } else if (userBtn) {
        userBtn.href = 'login.html';
    }
}

function toggleDropdown() {
    const dropdown = document.getElementById('userDropdown');
    if (dropdown) dropdown.classList.toggle('show');
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
    const dropdown = document.getElementById('userDropdown');
    const userBtn = document.getElementById('userNavBtn');
    if (dropdown && !dropdown.contains(e.target) && !userBtn.contains(e.target)) {
        dropdown.classList.remove('show');
    }
});

updateCartCount();
updateUserNav();
</script>
</body>
</html>
